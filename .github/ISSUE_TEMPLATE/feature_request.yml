name: ✨ Feature request
description: Suggest an enhancement to Dork LLM
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and why is it hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the API/CLI/config if relevant.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - model / training
        - generation / inference
        - evaluation
        - rag
        - agents
        - api / dashboard
        - docs / devops
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
