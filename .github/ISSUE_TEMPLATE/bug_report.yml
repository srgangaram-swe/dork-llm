name: 🐛 Bug report
description: Report a defect in Dork LLM
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug! Please include enough detail to reproduce it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command(s) you ran.
      placeholder: |
        1. make install
        2. make train-small-gpt
        3. ...
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      render: shell
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Python version, and which extras are installed.
      placeholder: "macOS 14, Python 3.11, .[all]"
    validations:
      required: true
