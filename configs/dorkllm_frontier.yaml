# AxiomStack — modern-small DorkLLM research profile.
#
# This config is intentionally still local-hardware friendly, but it moves beyond
# the default demo run: bigger context, more layers/width, RoPE, RMSNorm, SwiGLU,
# stochastic depth, gradient accumulation, and a capped TinyStories data target.
seed: 2026

data:
  dataset: tinystories
  data_dir: data
  raw_path: data/raw/tinystories.txt
  val_fraction: 0.02

tokenizer:
  type: bpe
  vocab_size: 8192
  path: tokenizers/dorkllm_bpe.json
  special_tokens: ["<|endoftext|>", "<|pad|>", "<|unk|>"]

model:
  block_size: 512
  n_layer: 8
  n_head: 8
  n_kv_head: 2
  n_embd: 512
  dropout: 0.12
  bias: false
  pos_encoding: rope
  norm_type: rmsnorm
  mlp_type: swiglu
  stochastic_depth: 0.05
  qk_norm: true

training:
  batch_size: 8
  max_steps: 8000
  gradient_accumulation_steps: 8
  eval_interval: 500
  eval_iters: 100
  log_interval: 25
  learning_rate: 3.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  decay_lr: true
  warmup_steps: 500
  min_lr: 3.0e-5
  device: auto
  dtype: auto
  compile: false
  out_dir: artifacts/dorkllm_frontier
  always_save_checkpoint: true

generation:
  max_new_tokens: 256
  temperature: 0.75
  top_k: 50
  top_p: 0.95

sft:
  base_out_dir: artifacts/dorkllm_frontier
  out_dir: artifacts/dorkllm_frontier_sft
  n_arith: 128
  val_fraction: 0.2
  batch_size: 8
  max_steps: 600
  eval_interval: 100
  learning_rate: 8.0e-5
  warmup_steps: 50
  min_lr: 8.0e-6

tracking:
  enabled: true
  out_dir: experiments
  project: dork-llm
  wandb: false
  tags: ["modern-small", "tinystories", "rmsnorm", "swiglu", "rope", "gqa", "qk-norm"]
